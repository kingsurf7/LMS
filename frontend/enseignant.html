<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduLMS - Tableau de bord Enseignant</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Barre de navigation -->
    <nav class="barre-navigation">
        <div class="conteneur">
            <div class="logo">
                <h1>📚 EduLMS</h1>
            </div>
            <div class="liens-navigation">
                <a href="#" class="lien-actif">Tableau de bord</a>
                <a href="#" onclick="chargerMesCours()">Mes cours</a>
                <a href="#" onclick="chargerMesReunions()">Mes réunions</a>
            </div>
            <div class="info-utilisateur">
                <span>👨‍🏫 <span id="nomEnseignant"></span></span>
                <button class="btn btn-danger btn-petit" onclick="deconnexion()">Déconnexion</button>
            </div>
        </div>
    </nav>

    <div class="tableau-bord">
        <div class="conteneur">
            <div class="en-tete-tableau-bord">
                <h1 class="titre-tableau-bord">Tableau de bord Enseignant</h1>
                <button class="btn btn-principal" onclick="ouvrirModalCours()">+ Nouveau cours</button>
            </div>

            <!-- Section Mes Cours -->
            <div class="carte">
                <div class="en-tete-carte">
                    <h3 class="titre-carte">📚 Mes cours</h3>
                </div>
                <div id="listeCours" class="liste-cours">
                    <p class="texte-centre">Chargement des cours...</p>
                </div>
            </div>

            <!-- Section Mes Réunions -->
            <div class="carte">
                <div class="en-tete-carte">
                    <h3 class="titre-carte">🎥 Réunions à venir</h3>
                    <button class="btn btn-principal btn-petit" onclick="ouvrirModalReunion()">+ Nouvelle réunion</button>
                </div>
                <div id="listeReunions" class="liste-reunions">
                    <p class="texte-centre">Chargement des réunions...</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal Création de cours -->
    <div id="modalCours" class="modal">
        <div class="contenu-modal">
            <span class="fermer">&times;</span>
            <h2>Créer un nouveau cours</h2>
            <form id="formCours">
                <input type="text" id="titreCours" placeholder="Titre du cours" required>
                <textarea id="descriptionCours" placeholder="Description du cours" rows="3"></textarea>
                <button type="button" class="btn btn-principal" onclick="creerCours()">Créer le cours</button>
            </form>
        </div>
    </div>

    <!-- Modal Création de leçon -->
    <div id="modalLecon" class="modal">
        <div class="contenu-modal">
            <span class="fermer">&times;</span>
            <h2>Ajouter une leçon</h2>
            <form id="formLecon">
                <input type="text" id="titreLecon" placeholder="Titre de la leçon" required>
                <textarea id="contenuLecon" placeholder="Contenu de la leçon" rows="3"></textarea>
                <select id="typeLecon" required>
                    <option value="video">Vidéo</option>
                    <option value="pdf">PDF</option>
                </select>
                <input type="file" id="fichierLecon" accept=".pdf,.mp4,.webm">
                <button type="button" class="btn btn-principal" onclick="creerLecon()">Créer la leçon</button>
            </form>
        </div>
    </div>

    <!-- Modal Création de réunion -->
    <div id="modalReunion" class="modal">
        <div class="contenu-modal">
            <span class="fermer">&times;</span>
            <h2>Créer une réunion</h2>
            <form id="formReunion">
                <input type="text" id="titreReunion" placeholder="Titre de la réunion" required>
                <textarea id="descriptionReunion" placeholder="Description" rows="2"></textarea>
                <select id="coursReunion" required>
                    <option value="">Sélectionner un cours</option>
                </select>
                <input type="datetime-local" id="heureReunion" required>
                <input type="number" id="dureeReunion" placeholder="Durée (minutes)" value="60">
                <button type="button" class="btn btn-principal" onclick="creerReunion()">Créer la réunion</button>
            </form>
        </div>
    </div>

    <!-- Modal Création d'évaluation -->
    <div id="modalEvaluation" class="modal">
        <div class="contenu-modal grand">
            <span class="fermer">&times;</span>
            <h2>Créer une évaluation</h2>
            <form id="formEvaluation">
                <input type="text" id="titreEvaluation" placeholder="Titre de l'évaluation" required>
                <input type="number" id="scoreMinimum" placeholder="Score minimum (%)" value="60">
                
                <div id="questionsContainer"></div>
                
                <button type="button" class="btn btn-secondaire" onclick="ajouterQuestion()">+ Ajouter une question</button>
                <button type="button" class="btn btn-principal" onclick="sauvegarderEvaluation()">Sauvegarder l'évaluation</button>
            </form>
        </div>
    </div>

    <script src="js/main.js"></script>
    <script src="js/enseignant.js"></script>
</body>
              </html>
